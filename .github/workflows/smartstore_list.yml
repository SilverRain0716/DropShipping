name: Smartstore Auto Lister

on:
  # CJ 크롤러 완료 후 자동 트리거
  workflow_run:
    workflows: ["CJ Dropshipping Crawler"]
    types: [completed]

  # 수동 트리거
  workflow_dispatch:

jobs:
  list:
    name: 스마트스토어 자동 리스팅 (EC2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ⚠️ GitHub Actions runner IP는 매번 변경됨 (Azure 랜덤)
      # 네이버 커머스 API는 IP 화이트리스트 필수 → 0.0.0.0/0 허용 불가
      # ✅ 해결: EC2 고정 IP(52.79.177.182)에서 SSH 실행
      - name: EC2 SSH 접속 후 스마트스토어 리스팅 실행
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 52.79.177.182
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 25m
          script: |
            cd ~/dropship-crawler

            # 최신 코드 pull
            git pull origin main

            # venv 활성화
            source venv/bin/activate

            # 신규 패키지 설치 (requirements_smartstore.txt)
            pip install -r requirements_smartstore.txt -q

            # GCP 인증 파일 확인
            if [ ! -f service_account.json ]; then
              echo "ERROR: service_account.json 없음"
              exit 1
            fi

            # 환경변수 주입 후 실행
            export NAVER_CLIENT_ID='${{ secrets.NAVER_CLIENT_ID }}'
            export NAVER_CLIENT_SECRET='${{ secrets.NAVER_CLIENT_SECRET }}'
            export CJ_EMAIL='${{ secrets.CJ_EMAIL }}'
            export CJ_PASSWORD='${{ secrets.CJ_PASSWORD }}'
            export CJ_API_KEY='${{ secrets.CJ_API_KEY }}'
            export SHEET_ID='${{ secrets.SHEET_ID }}'
            export DISCORD_WEBHOOK_URL='${{ secrets.DISCORD_WEBHOOK_URL }}'
            export GOOGLE_SA_KEY_PATH="service_account.json"

            mkdir -p ~/logs
            python smartstore_lister.py 2>&1 | tee ~/logs/smartstore.log
            echo "--- 실행 완료 (마지막 20줄) ---"
            tail -20 ~/logs/smartstore.log
