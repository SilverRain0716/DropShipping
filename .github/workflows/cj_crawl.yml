name: CJ Dropshipping Crawler

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  crawl:
    name: CJ 위닝 후보 수집
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_cj.txt

      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements_cj.txt

      - name: GCP 인증 파일 복원
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > service_account.json

      - name: CJ 크롤러 실행
        env:
          CJ_EMAIL:            ${{ secrets.CJ_EMAIL }}
          CJ_PASSWORD:         ${{ secrets.CJ_PASSWORD }}
          CJ_API_KEY:          ${{ secrets.CJ_API_KEY }}
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PROXY_HOST:          ${{ secrets.PROXY_HOST }}
          PROXY_PORT:          ${{ secrets.PROXY_PORT }}
          PROXY_USER_BASE:     ${{ secrets.PROXY_USER_BASE }}
          PROXY_PASSWORD:      ${{ secrets.PROXY_PASSWORD }}
          GOOGLE_SA_KEY_PATH:  service_account.json
        run: python cj_crawler.py

      - name: 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cj-log-${{ github.run_id }}
          path: cj_crawler.log
          retention-days: 7

      - name: 인증 파일 정리
        if: always()
        run: rm -f service_account.json
