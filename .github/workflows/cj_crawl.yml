# .github/workflows/cj_crawl.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CJ Dropshipping 크롤러 자동 실행 스케줄
# 실행 시각: KST 07:00 (UTC 22:00 전일)
# ⚠️ GitHub Actions Runner IP ≠ 판매 계정 IP (자동 분리됨)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: CJ Dropshipping 크롤러

on:
  # KST 07:00 = UTC 22:00 (전날)
  schedule:
    - cron: "0 22 * * *"

  # 수동 실행 허용 (Actions 탭에서 직접 트리거 가능)
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "디버그 모드 (로그 상세 출력)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  crawl:
    name: CJ 위닝 후보 수집
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 최대 60분 실행 제한

    steps:
      # ── 1. 소스 코드 체크아웃
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      # ── 2. Python 3.11 환경 설정
      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_cj.txt

      # ── 3. 의존성 패키지 설치
      - name: 📦 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements_cj.txt

      # ── 4. GCP 서비스 계정 JSON 파일 생성
      #    GitHub Secret에서 base64 디코딩하여 파일로 저장
      - name: 🔑 GCP 인증 파일 생성
        run: |
          echo "${{ secrets.GCP_CREDENTIALS_B64 }}" | base64 -d > gcp_credentials.json

      # ── 5. 크롤러 실행
      #    ⚠️ 판매 계정과 IP 완전 분리: GitHub Actions 자체 IP + Webshare Proxy 경유
      - name: 🕷️ CJ 크롤러 실행
        env:
          CJ_EMAIL:           ${{ secrets.CJ_EMAIL }}
          CJ_API_KEY:         ${{ secrets.CJ_API_KEY }}
          GOOGLE_SHEETS_ID:   ${{ secrets.GOOGLE_SHEETS_ID }}
          DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
          PROXY_USER:         ${{ secrets.PROXY_USER }}
          PROXY_PASS:         ${{ secrets.PROXY_PASS }}
          PROXY_HOST:         ${{ secrets.PROXY_HOST }}
          PROXY_PORT:         ${{ secrets.PROXY_PORT }}
          GCP_CREDENTIALS_JSON: gcp_credentials.json
        run: |
          python cj_crawler.py

      # ── 6. 로그 파일 아티팩트 저장 (7일 보관)
      - name: 📋 로그 저장
        if: always()   # 성공/실패 관계없이 실행
        uses: actions/upload-artifact@v4
        with:
          name: cj-crawler-log-${{ github.run_id }}
          path: cj_crawler.log
          retention-days: 7

      # ── 7. GCP 인증 파일 삭제 (보안)
      - name: 🔒 인증 파일 정리
        if: always()
        run: rm -f gcp_credentials.json
